<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DealFlash ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0A;--surface:#161616;--surface2:#1E1E1E;--border:#2A2A2A;--red:#FF2D55;--green:#00C46A;--orange:#FF9500;--blue:#0A84FF;--text:#F5F5F5;--muted:#888;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:22px;font-weight:900;letter-spacing:-.5px}.logo span{color:var(--red)}
.header-right{display:flex;gap:8px;align-items:center}
.icon-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;position:relative}
.notif-badge{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid var(--bg)}
.search-bar{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:0 12px;margin-bottom:10px;gap:8px}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;padding:11px 0}
.search-bar input::placeholder{color:var(--muted)}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
.chip.active{background:var(--red);border-color:var(--red);color:#fff}
.chip:active:not(.active){opacity:.7}

/* STATS */
.stats-bar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
.stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat-value{font-size:18px;font-weight:800;display:block}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-top:2px}

/* SECTION TITLES */
.section-title{padding:16px 16px 8px;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* SORT BAR */
.sort-bar{padding:0 16px 8px;display:flex;align-items:center;gap:8px}
.sort-bar label{font-size:12px;color:var(--muted)}
.sort-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;font-family:'Inter',sans-serif;padding:5px 10px;border-radius:8px;outline:none;cursor:pointer}

/* DEAL CARDS */
.deals-feed{padding:0 12px;display:flex;flex-direction:column;gap:10px}
.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .1s,border-color .1s;position:relative}
.deal-card:active{transform:scale(.98)}
.deal-card.hot{border-color:rgba(255,45,85,.35)}
.deal-card-img{width:100%;height:190px;object-fit:cover;display:block;background:var(--surface2)}
.deal-img-placeholder{width:100%;height:190px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:52px}
.badge-hot{position:absolute;top:10px;left:10px;background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:4px 9px;border-radius:20px;animation:flame 2s ease-in-out infinite}
.badge-discount{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.75);color:var(--green);font-size:12px;font-weight:800;padding:4px 9px;border-radius:20px;backdrop-filter:blur(4px)}
@keyframes flame{0%,100%{box-shadow:0 0 8px rgba(255,45,85,.4)}50%{box-shadow:0 0 18px rgba(255,45,85,.8)}}
.deal-body{padding:12px}
.merchant-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.merchant-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:capitalize;letter-spacing:.3px}
.deal-category{font-size:11px;color:var(--muted)}
.deal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.price-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:10px}
.price-now{font-size:24px;font-weight:900;color:var(--green);line-height:1}
.price-was{font-size:14px;color:var(--muted);text-decoration:line-through;margin-bottom:2px}
.discount-badge{margin-left:auto;background:rgba(0,196,106,.15);color:var(--green);font-size:13px;font-weight:800;padding:4px 10px;border-radius:8px}
.stock-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.stock-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.stock-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.stock-bar-fill.low{background:var(--red)}.stock-bar-fill.mid{background:var(--orange)}.stock-bar-fill.high{background:var(--green)}
.stock-label{font-size:11px;font-weight:600;white-space:nowrap}
.stock-label.low{color:var(--red)}.stock-label.mid{color:var(--orange)}.stock-label.high{color:var(--muted)}
.deal-footer{display:flex;gap:8px;align-items:center}
.btn-deal{flex:1;background:var(--red);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn-deal:active{opacity:.8}
.btn-action{width:46px;height:46px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;transition:all .15s;flex-shrink:0}
.btn-action.saved{background:rgba(255,45,85,.15);border-color:var(--red)}
.btn-action:active{transform:scale(.9)}

/* SKELETONS */
.skeleton-card{background:var(--surface);border-radius:16px;overflow:hidden}
.skeleton-img{height:190px;background:linear-gradient(90deg,var(--surface2) 25%,#222 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.skeleton-line{height:12px;border-radius:6px;margin:8px 12px;background:linear-gradient(90deg,var(--surface2) 25%,#222 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* HOT SCROLL */
.hot-scroll{overflow-x:auto;padding:0 12px 4px;display:flex;gap:10px;scrollbar-width:none}
.hot-scroll::-webkit-scrollbar{display:none}
.mini-card{flex-shrink:0;width:155px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .1s}
.mini-card:active{transform:scale(.97)}
.mini-card-img-real{width:100%;height:100px;object-fit:cover;display:block}
.mini-card-img{width:100%;height:100px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px}
.mini-card-body{padding:10px}
.mini-card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.mini-card-price{font-size:15px;font-weight:900;color:var(--green)}
.mini-card-was{font-size:11px;color:var(--muted);text-decoration:line-through}
.mini-card-badge{display:inline-block;background:rgba(255,45,85,.15);color:var(--red);font-size:11px;font-weight:700;padding:2px 6px;border-radius:5px;margin-top:3px}

/* CATEGORIES */
.cats-row{display:flex;gap:8px;overflow-x:auto;padding:0 12px 8px;scrollbar-width:none}
.cats-row::-webkit-scrollbar{display:none}

/* AI PANEL */
.ai-panel{margin:12px;background:linear-gradient(135deg,#1a0a1e 0%,#0d0d1e 100%);border:1px solid rgba(138,43,226,.3);border-radius:16px;padding:14px;position:relative;overflow:hidden}
.ai-panel::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:rgba(138,43,226,.15);border-radius:50%;filter:blur(30px);pointer-events:none}
.ai-title{font-size:12px;font-weight:700;color:#B06EFF;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.ai-subtitle{font-size:12px;color:rgba(255,255,255,.45);line-height:1.4}
.ai-input-row{display:flex;gap:8px;margin-top:10px}
.ai-input{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none}
.ai-input::placeholder{color:rgba(255,255,255,.3)}
.ai-btn{background:#7B2FBE;border:none;border-radius:10px;width:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:opacity .15s;flex-shrink:0}
.ai-btn:active{opacity:.7}
.ai-response{margin-top:10px;font-size:13px;color:rgba(255,255,255,.85);line-height:1.5}
.ai-loading{display:flex;gap:4px;align-items:center;margin-top:10px}
.dot-bounce{width:6px;height:6px;background:#B06EFF;border-radius:50%;animation:bounce 1.2s infinite}
.dot-bounce:nth-child(2){animation-delay:.2s}.dot-bounce:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* DETAIL PAGE */
#page-detail,#page-compare,#page-alerts,#page-favorites{display:none}
.detail-header{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.detail-actions{display:flex;gap:8px}
.detail-img-wrap{position:relative;width:100%;height:260px;background:var(--surface2);overflow:hidden}
.detail-img{width:100%;height:100%;object-fit:cover;display:block}
.detail-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px}
.detail-body{padding:16px}
.detail-title{font-size:18px;font-weight:800;line-height:1.3;margin:10px 0}
.detail-price-block{display:flex;align-items:flex-end;gap:10px;margin-bottom:8px}
.savings-tag{background:rgba(0,196,106,.12);border:1px solid rgba(0,196,106,.25);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--green);margin-bottom:14px;display:inline-block}
.detail-stock{margin-bottom:16px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.section-card-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.info-grid{display:flex;flex-direction:column;gap:8px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:13px;color:var(--muted)}.info-val{font-size:13px;font-weight:600}
.btn-deal-big{display:block;background:var(--red);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;text-align:center;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;margin-top:4px;transition:opacity .15s}
.btn-deal-big:active{opacity:.8}
.alert-form{display:flex;flex-direction:column;gap:8px}
.alert-input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none}
.alert-input:focus{border-color:rgba(138,43,226,.5)}
.btn-alert{background:linear-gradient(135deg,#7B2FBE,#5a1f8a);border:none;border-radius:10px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn-alert:active{opacity:.8}

/* COMPARE */
.compare-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start;margin-bottom:14px}
.compare-slot{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.compare-slot.empty{border-style:dashed;cursor:pointer;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.compare-slot.filled{}
.compare-thumb{width:100%;height:100px;object-fit:contain;border-radius:8px;margin-bottom:8px;background:var(--surface2)}
.compare-slot-title{font-size:12px;font-weight:600;line-height:1.3;color:var(--text);margin-bottom:6px}
.vs-separator{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--muted);padding-top:60px}
.btn-remove-compare{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;margin-top:8px;font-family:'Inter',sans-serif}
.versus-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.versus-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.versus-row:last-child{border-bottom:none}.versus-row span{color:var(--muted)}

/* ALERTS */
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.alert-card-title{font-size:13px;font-weight:600;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.alert-card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.alert-email{color:var(--muted)}.alert-price{font-weight:700;color:var(--green)}
.btn-remove-alert{background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.3);color:var(--red);font-size:11px;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif}

/* LOAD MORE */
.load-more{margin:16px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px;text-align:center;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;width:calc(100% - 24px)}
.load-more:active{border-color:var(--red);color:var(--red)}

/* EMPTY */
.empty-state{text-align:center;padding:48px 24px;font-size:15px;color:var(--muted);line-height:1.8}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,10,10,.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:8px 0 16px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;transition:opacity .15s}
.nav-item:active{opacity:.6}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;font-weight:600;color:var(--muted)}
.nav-item.active .nav-label{color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;color:var(--text);z-index:999;opacity:0;transition:all .25s;white-space:nowrap;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ══ HOME PAGE ══ -->
<div id="page-home">

  <div class="header">
    <div class="header-top">
      <div class="logo">Deal<span>Flash</span> ⚡</div>
      <div class="header-right">
        <div class="icon-btn" onclick="state.page='compare';renderPage()">⚖️</div>
        <div class="icon-btn">🔔<div class="notif-badge"></div></div>
      </div>
    </div>
    <div class="search-bar">
      <span style="color:var(--muted);font-size:15px">🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher un produit, une marque...">
    </div>
    <div class="filters" id="filtersRow">
      <div class="chip active" data-filter="all">Tous</div>
      <div class="chip" data-filter="amazon" style="color:#FF9900">Amazon</div>
      <div class="chip" data-filter="cdiscount" style="color:#E2001A">Cdiscount</div>
      <div class="chip" data-filter="boulanger" style="color:#E40046">Boulanger</div>
      <div class="chip" data-filter="darty" style="color:#FF6600">Darty</div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat"><span class="stat-value" id="statTotal">—</span><span class="stat-label">Deals actifs</span></div>
    <div class="stat"><span class="stat-value" id="statBest" style="color:var(--green)">—</span><span class="stat-label">Meilleure remise</span></div>
    <div class="stat"><span class="stat-value" id="statLow" style="color:var(--red)">—</span><span class="stat-label">Stock faible</span></div>
  </div>

  <!-- Categories -->
  <div class="section-title">📂 Catégories</div>
  <div class="cats-row" id="categoriesRow"></div>

  <!-- AI -->
  <div class="ai-panel">
    <div class="ai-title">✨ Assistant Deals IA</div>
    <div class="ai-subtitle">Demande un deal, une comparaison ou un conseil d'achat.</div>
    <div class="ai-input-row">
      <input class="ai-input" id="aiInput" placeholder="Ex: TV 55 pouces moins de 600€..." />
      <button class="ai-btn" id="aiBtn">🪄</button>
    </div>
    <div class="ai-loading" id="aiLoading" style="display:none">
      <div class="dot-bounce"></div><div class="dot-bounce"></div><div class="dot-bounce"></div>
    </div>
    <div class="ai-response" id="aiResponse"></div>
  </div>

  <!-- Flash deals -->
  <div class="section-title"><div class="live-dot"></div> Flash Deals</div>
  <div class="hot-scroll" id="hotScroll"></div>

  <!-- Sort bar -->
  <div class="sort-bar">
    <label>Trier par :</label>
    <select class="sort-select" id="sortSelect">
      <option value="discount">Meilleure remise</option>
      <option value="recent">Plus récents</option>
      <option value="price_asc">Prix croissant</option>
      <option value="price_desc">Prix décroissant</option>
    </select>
    <span id="dealCount" style="margin-left:auto;font-size:12px;color:var(--muted)">0 deals</span>
  </div>

  <!-- Feed -->
  <div class="deals-feed" id="dealsFeed"></div>
  <button class="load-more" id="loadMoreBtn" style="display:none">Charger plus de deals ↓</button>
</div>

<!-- ══ DETAIL PAGE ══ -->
<div id="page-detail"></div>

<!-- ══ COMPARE PAGE ══ -->
<div id="page-compare"></div>

<!-- ══ ALERTS PAGE ══ -->
<div id="page-alerts"></div>

<!-- ══ FAVORITES PAGE ══ -->
<div id="page-favorites"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label">Accueil</span></div>
  <div class="nav-item"><span class="nav-icon">🔥</span><span class="nav-label">Trending</span></div>
  <div class="nav-item"><span class="nav-icon">🔔</span><span class="nav-label">Alertes</span></div>
  <div class="nav-item"><span class="nav-icon">❤️</span><span class="nav-label">Favoris</span></div>
  <div class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profil</span></div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
